<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="WeedTown">
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aeea00"/>
      <stop offset="0.55" stop-color="#7cb342"/>
      <stop offset="1" stop-color="#33691e"/>
    </linearGradient>
    <linearGradient id="leafSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ccc65"/>
      <stop offset="1" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8bc34a"/>
      <stop offset="0.6" stop-color="#388e3c"/>
      <stop offset="1" stop-color="#455a64"/>
    </linearGradient>
    <!-- Folíolo: hoja puntiaguda; se compone en abanico para formar la hoja de cannabis -->
    <path id="leaflet" d="M0 0 C -5 -12 -7 -30 0 -52 C 7 -30 5 -12 0 0 Z"/>
    <g id="cannabisLeaf">
      <use href="#leaflet" transform="rotate(-64) scale(0.62)"/>
      <use href="#leaflet" transform="rotate(-32) scale(0.85)"/>
      <use href="#leaflet" transform="rotate(32) scale(0.85)"/>
      <use href="#leaflet" transform="rotate(64) scale(0.62)"/>
      <use href="#leaflet"/>
    </g>
    <path id="spark" d="M0 -6 L1.6 -1.6 L6 0 L1.6 1.6 L0 6 L-1.6 1.6 L-6 0 L-1.6 -1.6 Z"/>
  </defs>

  <!-- Fondo -->
  <circle cx="100" cy="98" r="96" fill="#ffffff"/>
  <!-- Anillos -->
  <circle cx="100" cy="96" r="82" fill="none" stroke="#546e7a" stroke-width="5" opacity="0.9"/>
  <circle cx="100" cy="96" r="74" fill="none" stroke="#b0bec5" stroke-width="2.5"/>

  <!-- Edificios -->
  <g>
    <rect x="62" y="88" width="18" height="58" rx="1.5" fill="#37474f"/>
    <rect x="84" y="72" width="22" height="74" rx="1.5" fill="#546e7a"/>
    <rect x="110" y="82" width="20" height="64" rx="1.5" fill="#2e4632"/>
    <rect x="132" y="98" width="14" height="48" rx="1.5" fill="#37474f"/>
    <rect x="93" y="62" width="4" height="12" fill="#546e7a"/>
    <!-- Ventanas -->
    <g fill="#eceff1">
      <rect x="66" y="94" width="4" height="5"/><rect x="73" y="94" width="4" height="5"/>
      <rect x="66" y="104" width="4" height="5"/><rect x="73" y="104" width="4" height="5"/>
      <rect x="66" y="114" width="4" height="5"/><rect x="73" y="114" width="4" height="5"/>
      <rect x="89" y="80" width="5" height="6"/><rect x="97" y="80" width="5" height="6"/>
      <rect x="89" y="92" width="5" height="6"/><rect x="97" y="92" width="5" height="6"/>
      <rect x="89" y="104" width="5" height="6"/><rect x="97" y="104" width="5" height="6"/>
      <rect x="114" y="90" width="4" height="5"/><rect x="121" y="90" width="4" height="5"/>
      <rect x="114" y="100" width="4" height="5"/><rect x="121" y="100" width="4" height="5"/>
      <rect x="135" y="104" width="3" height="4"/><rect x="140" y="104" width="3" height="4"/>
      <rect x="135" y="112" width="3" height="4"/><rect x="140" y="112" width="3" height="4"/>
    </g>
  </g>

  <!-- Hojas de cannabis -->
  <use href="#cannabisLeaf" transform="translate(58 96) rotate(-38) scale(1.02)" fill="url(#leafSide)"/>
  <use href="#cannabisLeaf" transform="translate(142 96) rotate(38) scale(1.02)" fill="url(#leafSide)"/>
  <use href="#cannabisLeaf" transform="translate(100 84) scale(1.45)" fill="url(#leaf)"/>

  <!-- Swoosh -->
  <path d="M16 138 Q 100 172 184 132" fill="none" stroke="url(#swoosh)" stroke-width="10" stroke-linecap="round"/>
  <path d="M26 150 Q 102 178 178 146" fill="none" stroke="#546e7a" stroke-width="4" stroke-linecap="round" opacity="0.75"/>

  <!-- Destellos -->
  <g fill="#aeea00">
    <use href="#spark" transform="translate(48 52) scale(0.9)"/>
    <use href="#spark" transform="translate(156 48)"/>
    <use href="#spark" transform="translate(166 84) scale(0.7)"/>
    <use href="#spark" transform="translate(36 92) scale(0.7)"/>
  </g>
</svg>
